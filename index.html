<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALENDAR / 업무일지</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Asta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--sf:#161618;--sf2:#1e1e21;--sf3:#252528;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f0efe8;--t2:#888882;--t3:#44443f;
  --f:'Asta Sans',-apple-system,'Helvetica Neue',sans-serif;
  --mono:'DM Mono',monospace;
  --leave:#f43f5e;--leave-bg:rgba(244,63,94,.15);
}
body{background:var(--bg);color:var(--t1);font-family:var(--f);font-size:11px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
.hd{height:44px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,14,16,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--t1);letter-spacing:-.01em}
.logo span{color:var(--t2)}
.hd-r{display:flex;align-items:center;gap:0}
.hd-date{font-family:var(--f);font-size:11px;font-weight:500;color:var(--t2);white-space:nowrap}
.hd-date strong{color:var(--t1);font-weight:600}
.tabs{display:flex;align-items:center;padding:0 12px;background:var(--sf);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:99;gap:4px;min-height:48px}
.tabs-list{display:flex;align-items:center;flex:1}
.tabs-mobile-left{display:none;align-items:center;gap:8px;flex:1}
.tabs-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tab{padding:10px 12px;font-family:var(--f);font-size:11px;font-weight:500;color:var(--t2);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;line-height:1;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--t1);border-bottom-color:var(--t1);font-weight:600}
.tab:hover:not(.on){color:var(--t1)}
.tabs-spacer{flex:1}
.tabs-hamburger{width:28px;height:28px;border-radius:6px;background:var(--sf2);border:1px solid var(--b2);color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.tabs-hamburger:hover{color:var(--t1);border-color:rgba(255,255,255,.25)}
.tabs-dropdown{display:none;position:fixed;top:44px;left:0;right:0;background:var(--sf);border-bottom:1px solid var(--b2);z-index:98;flex-direction:column;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.tabs-dropdown.open{display:flex}
.tabs-dropdown .tab{padding:13px 20px;border-bottom:1px solid var(--b);border-left:3px solid transparent;border-top:none;border-right:none;margin:0;font-size:12px;text-align:left;width:100%}
.tabs-dropdown .tab.on{border-left-color:var(--t1);background:rgba(255,255,255,.04);border-bottom-color:var(--b)}
.tabs-dropdown .tab:last-child{border-bottom:none}
@media(max-width:640px){
  .tabs-list{display:none}
  .tabs-mobile-left{display:flex}
  .panels{padding:10px}
}
.tab.on{color:var(--t1);border-bottom-color:var(--t1);font-weight:600}
.tab:hover:not(.on){color:var(--t1)}
.tabs-spacer{flex:1}
.btn-plus{width:26px;height:26px;border-radius:5px;background:var(--t1);color:var(--bg);border:none;font-size:16px;font-weight:400;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .15s;font-family:var(--f);flex-shrink:0}
.btn-plus:hover{opacity:.75}
.btn-settings{height:26px;min-width:26px;padding:0 8px;border-radius:5px;background:var(--sf2);color:var(--t2);border:1px solid var(--b2);font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-family:var(--f);flex-shrink:0;white-space:nowrap}
.btn-settings:hover{color:var(--t1);border-color:rgba(255,255,255,.25)}
.dd{position:relative}
.dd-btn{display:flex;align-items:center;gap:6px;height:27px;padding:0 9px;background:var(--sf2);border:1px solid var(--b2);border-radius:6px;cursor:pointer;font-family:var(--f);font-size:11px;font-weight:500;color:var(--t1);min-width:92px;white-space:nowrap}
.dd-btn:hover,.dd-btn.open{border-color:rgba(255,255,255,.25)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dd-nm{flex:1;text-align:left}
.arr{color:var(--t2);font-size:9px;transition:transform .15s}
.dd-btn.open .arr{transform:rotate(180deg)}
.dd-menu{position:absolute;top:calc(100% + 5px);right:0;left:auto;min-width:120px;background:var(--sf2);border:1px solid var(--b2);border-radius:9px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transform:translateY(-5px);transition:opacity .15s,transform .15s}
.dd-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.dd-item{display:flex;align-items:center;gap:8px;padding:7px 12px;font-family:var(--f);font-size:11px;color:var(--t1);cursor:pointer;transition:background .1s}
.dd-item:hover{background:var(--sf3)}
.dd-item.sel{font-weight:600}
.dd-sep{height:1px;background:var(--b);margin:3px 0}
.vbtn{height:27px;padding:0 11px;border-radius:6px;border:1px solid var(--b2);background:none;font-family:var(--f);font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.vbtn.on{background:var(--sf3);color:var(--t1);border-color:rgba(255,255,255,.22)}
.vbtn:hover:not(.on){color:var(--t1);border-color:rgba(255,255,255,.2)}
.view-bar{display:flex;align-items:center;gap:5px}
.nav-btn{width:27px;height:27px;border-radius:6px;background:var(--sf2);border:1px solid var(--b2);color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--f)}
.nav-btn:hover{color:var(--t1);border-color:rgba(255,255,255,.25)}
.nav-wrap{display:flex;gap:3px}
.panels{padding:16px 20px}
.panel{display:none}
.panel.on{display:block;animation:up .16s ease}
@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ptop{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ptitle{font-family:var(--f);font-size:13px;font-weight:600;color:var(--t1)}
.psub{font-family:var(--f);font-size:10px;color:var(--t2)}
.ptop-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.slbl{font-family:var(--f);font-size:10px;font-weight:600;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--b)}
.slbl:first-child{margin-top:0}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;border-bottom:1px solid var(--b);padding-bottom:6px}
.wday{text-align:center;font-family:var(--f);font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase}
.wday:first-child{color:rgba(244,63,94,.5)}
.wday:last-child{color:rgba(59,130,246,.5)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cell{min-height:158px;background:var(--sf);border:1px solid var(--b);border-radius:6px;padding:5px;cursor:pointer;overflow:hidden;transition:border-color .15s}
.cell:hover{border-color:var(--b2)}
.cell.today{border-color:rgba(255,255,255,.28)}
.cell.other{opacity:.22}
.cdate{font-family:var(--f);font-size:10px;font-weight:500;color:var(--t2);margin-bottom:3px;min-height:17px;display:flex;align-items:center}
.today-circle{width:17px;height:17px;border-radius:50%;background:var(--t1);color:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--f);font-size:9px;font-weight:700}
.ec{font-family:var(--f);font-size:9px;font-weight:600;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:opacity .12s;line-height:1.5}
.ec:hover{opacity:.8}
.ec.done{text-decoration:line-through;opacity:.3}
.more{font-family:var(--f);font-size:8px;color:var(--t3);cursor:pointer;padding:1px 3px}
.more:hover{color:var(--t2)}
.card{background:var(--sf);border:1px solid var(--b);border-left:3px solid var(--b);border-radius:7px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.card:hover{border-color:var(--b2)}
.card.done{opacity:.38}
.card.done .ctitle{text-decoration:line-through}
.chk{display:none}
.cbody{flex:1;min-width:0}
.cprojline{font-family:var(--f);font-size:10px;color:var(--t3);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cprojline-artist{font-weight:700}
.ctitle{font-family:var(--f);font-size:11px;font-weight:500;color:var(--t1);margin-bottom:4px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-family:var(--f);font-size:10px;color:var(--t2)}
.ctime-urg{font-family:var(--f);font-size:10px;font-weight:600;color:var(--leave)}
.cright{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;min-width:90px}
.cwho-pill{font-family:var(--f);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--sf3);color:var(--t1);white-space:nowrap}
.cdday{font-family:var(--f);font-size:10px;font-weight:700;color:var(--t3)}
.cdday.urg{color:var(--leave)}
.daily-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.daily-grid .slbl{grid-column:1/-1}
.wk-outer{display:flex;flex-direction:column;gap:18px}
.mo-back{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500}
.mo-back.on{display:block}
.mo-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);width:min(520px,90vw);background:var(--sf2);border:1px solid var(--b2);border-radius:12px;padding:20px;z-index:501;opacity:0;transition:opacity .18s,transform .18s;max-height:80vh;overflow-y:auto}
.mo-box.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
.mo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mo-title{font-family:var(--f);font-size:12px;font-weight:600;color:var(--t1)}
.mo-close{width:22px;height:22px;border-radius:5px;background:var(--sf3);border:1px solid var(--b);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;font-family:var(--f)}
.mo-close:hover{color:var(--t1)}
.empty{font-family:var(--f);font-size:11px;color:var(--t3);padding:10px 0}
.add-mo-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);width:min(480px,90vw);background:var(--sf2);border:1px solid var(--b2);border-radius:12px;padding:0;z-index:501;opacity:0;transition:opacity .18s,transform .18s;max-height:90vh;overflow-y:auto;pointer-events:none}
.add-mo-box.on{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:all}
.add-mo-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 11px;border-bottom:1px solid var(--b)}
.add-mo-title{font-family:var(--f);font-size:12px;font-weight:600;color:var(--t1)}
.add-mo-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:10px}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-row label{font-family:var(--f);font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:-.01em}
.form-inp{width:100%;height:29px;background:var(--sf3);border:1px solid var(--b2);border-radius:6px;padding:0 10px;font-family:var(--f);font-size:11px;color:var(--t1);outline:none;transition:border-color .15s}
.form-inp:focus{border-color:rgba(255,255,255,.3)}
.form-inp::placeholder{color:var(--t3)}
.form-sel{width:100%;height:29px;background:var(--sf3);border:1px solid var(--b2);border-radius:6px;padding:0 10px;font-family:var(--f);font-size:11px;color:var(--t1);outline:none;appearance:none;cursor:pointer;transition:border-color .15s}
.form-sel:focus{border-color:rgba(255,255,255,.3)}
.add-mo-foot{display:flex;justify-content:flex-end;gap:7px;padding:0 18px 14px}
.btn-cancel{height:29px;padding:0 13px;border-radius:6px;background:none;border:1px solid var(--b2);font-family:var(--f);font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s}
.btn-cancel:hover{color:var(--t1);border-color:rgba(255,255,255,.25)}
.btn-add{height:29px;padding:0 15px;border-radius:6px;background:var(--t1);border:none;font-family:var(--f);font-size:11px;font-weight:600;color:var(--bg);cursor:pointer;transition:opacity .15s}
.btn-add:hover{opacity:.8}
::-webkit-scrollbar{width:4px;height:4px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
@media(max-width:700px){
  .panels{padding:10px}
  .wk-mob-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
  .wk-mob-inner{min-width:560px}
  .daily-mob-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
}
.wk-card-artist{font-size:8px;opacity:.75}
.wk-card-title{font-size:10px}
.wk-card-meta{font-size:8px}
@media(min-width:700px){.wk-card-artist{font-size:8px}.wk-card-title{font-size:11px}.wk-card-meta{font-size:8px}}
@media(min-width:1100px){.wk-card-artist{font-size:9px}.wk-card-title{font-size:12px}.wk-card-meta{font-size:9px}}
@media(min-width:1440px){.wk-card-artist{font-size:9px}.wk-card-title{font-size:13px}.wk-card-meta{font-size:9px}}
</style>
</head>
<body>

<div class="tabs" id="tabs-bar">
  <!-- 데스크탑: 탭 나열 (좌측) -->
  <div class="tabs-list">
    <button class="tab on" data-panel="monthly" onclick="sw('monthly',this)">MONTHLY</button>
    <button class="tab" data-panel="projects" onclick="sw('projects',this)">PROJECTS</button>
    <button class="tab" data-panel="daily" onclick="sw('daily',this)">DAILY</button>
    <button class="tab" data-panel="weekly" onclick="sw('weekly',this)">WEEKLY</button>
    <button class="tab" data-panel="report" onclick="sw('report',this)">SUMMARY</button>
    <button class="tab" data-panel="settings" onclick="sw('settings',this)">SETTINGS</button>
  </div>
  <!-- 모바일: 현재탭 이름 (좌측) -->
  <div class="tabs-mobile-left">
    <button class="tabs-hamburger" id="tabs-hamburger" onclick="toggleMobileMenu()">☰</button>
    <span id="tabs-current-label" style="font-family:var(--f);font-size:11px;font-weight:600;color:var(--t1)">MONTHLY</span>
  </div>
  <!-- 우측 버튼 (항상 표시) -->
  <div class="tabs-actions">
    <span id="hd-date-display" style="font-family:var(--f);font-size:10px;color:var(--t2);white-space:nowrap;margin-right:4px"></span>
    <button class="btn-settings" id="btn-db" onclick="openDBSheet()">시트열기</button>
    <button class="btn-settings" id="btn-settings-btn" onclick="openSettings()">⚙</button>
    <button class="btn-plus" id="btn-add-ev">+</button>
  </div>
</div>

<!-- 모바일 드롭다운 -->
<div class="tabs-dropdown" id="tabs-dropdown">
  <button class="tab on" data-panel="monthly" onclick="swMobile('monthly',this)">MONTHLY</button>
  <button class="tab" data-panel="projects" onclick="swMobile('projects',this)">PROJECTS</button>
  <button class="tab" data-panel="daily" onclick="swMobile('daily',this)">DAILY</button>
  <button class="tab" data-panel="weekly" onclick="swMobile('weekly',this)">WEEKLY</button>
  <button class="tab" data-panel="report" onclick="swMobile('report',this)">SUMMARY</button>
  <button class="tab" data-panel="settings" onclick="swMobile('settings',this)">SETTINGS</button>
</div>

<div class="panels">

  <!-- MONTHLY -->
  <div class="panel on" id="panel-monthly">
    <div class="ptop">
      <div class="ptitle" id="m-month-lbl"></div>
      <div class="ptop-right">
        <div class="nav-wrap">
          <button class="nav-btn" onclick="chM(-1)">‹</button>
          <button class="nav-btn" onclick="chM(1)">›</button>
        </div>
        <div class="view-bar">
          <button class="vbtn on" id="m-v1" onclick="setMV('designer',this)">By Designer</button>
          <button class="vbtn" id="m-v2" onclick="setMV('project',this)">By Project</button>
        </div>
        <div class="dd" id="dd-m">
          <button class="dd-btn" id="ddb-m" onclick="tdd('m')">
            <span class="dot" id="dot-m" style="background:var(--t2)"></span>
            <span class="dd-nm" id="nm-m">전체 보기</span>
            <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="ddm-m" id="designer-dd-m">
            <!-- GS getBase() 로드 후 buildDesignerDropdown()으로 동적 생성 -->
          </div>
        </div>
        <div class="dd" id="dd-mp" style="display:none">
          <button class="dd-btn" id="ddb-mp" onclick="tdd('mp')">
            <span class="dot" id="dot-mp" style="background:var(--t3)"></span>
            <span class="dd-nm" id="nm-mp">All Artists</span>
            <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="ddm-mp">
            <!-- 동적 생성 -->
          </div>
        </div>
      </div>
    </div>
    <div class="wdays">
      <div class="wday">Sun</div><div class="wday">Mon</div><div class="wday">Tue</div>
      <div class="wday">Wed</div><div class="wday">Thu</div><div class="wday">Fri</div><div class="wday">Sat</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- DAILY -->
  <div class="panel" id="panel-daily">
    <div class="ptop">
      <div>
        <div class="ptitle" id="d-title"></div>
        <div class="psub" id="d-sub"></div>
      </div>
      <div class="ptop-right">
        <div class="nav-wrap">
          <button class="nav-btn" onclick="chD(-1)">‹</button>
          <button class="nav-btn" onclick="chD(1)">›</button>
        </div>
        <button class="vbtn" id="d-sort-btn" onclick="toggleDSort(this)">시간순</button>
        <div class="dd" id="dd-d">
          <button class="dd-btn" id="ddb-d" onclick="tdd('d')" style="min-width:90px">
            <span class="dot" id="dot-d" style="background:var(--t2)"></span>
            <span class="dd-nm" id="nm-d">전체 보기</span>
            <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="ddm-d"></div>
        </div>
        <div class="dd" id="dd-da">
          <button class="dd-btn" id="ddb-da" onclick="tdd('da')" style="min-width:90px">
            <span class="dot" id="dot-da" style="background:var(--t2)"></span>
            <span class="dd-nm" id="nm-da">전체 아티스트</span>
            <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="ddm-da"></div>
        </div>
      </div>
    </div>
    <div id="d-body"></div>
  </div>

  <!-- WEEKLY -->
  <div class="panel" id="panel-weekly">
    <div class="ptop">
      <div class="ptitle" id="w-title"></div>
      <div class="ptop-right">
        <div class="nav-wrap">
          <button class="nav-btn" onclick="chW(-1)">‹</button>
          <button class="nav-btn" onclick="chW(1)">›</button>
        </div>
        <div class="dd" id="dd-w">
          <button class="dd-btn" id="ddb-w" onclick="tdd('w')" style="min-width:90px">
            <span class="dot" id="dot-w" style="background:var(--t2)"></span>
            <span class="dd-nm" id="nm-w">전체 보기</span>
            <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="ddm-w"></div>
        </div>
        <div class="dd" id="dd-wa">
          <button class="dd-btn" id="ddb-wa" onclick="tdd('wa')" style="min-width:90px">
            <span class="dot" id="dot-wa" style="background:var(--t2)"></span>
            <span class="dd-nm" id="nm-wa">전체 아티스트</span>
            <span class="arr">▾</span>
          </button>
          <div class="dd-menu" id="ddm-wa"></div>
        </div>

<script>
const TODAY = new Date();
const DOW    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_KO = ['일','월','화','수','목','금','토'];

// ══════════════════════════════════════════════════════════
// ★ PATCH 1: API URL — GS 배포 후 실제 URL로 교체
// ══════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbxLJqzbDX2WkXXAxFnBBMk3BIKfEqu4NmYaw0mQQI15LvXl6cC-diUAaRR4gn0qlpoG/exec';
let API_READY = false;
let nextId    = 1; // ★ PATCH 5: 초기값 1 (GS 로드 후 max+1로 갱신)

// ══════════════════════════════════════════════════════════
// ★ PATCH 2: DEFAULT_ARTIST_MAP 삭제 → GS getBase()가 단일 소스
// BASE_DATA는 빈 상태로 시작, loadBaseFromAPI()가 GS로 채움
// ══════════════════════════════════════════════════════════
let BASE_DATA = {
  designers:    [],
  agencies:     [],
  artistMap:    {},
  projectTypes: [],
};

// ★ PATCH 3: 디자이너 컬러맵 — GS 기준 '유이시'로 통일
// 웹앱 UI 컬러는 그대로 유지, key만 변경
const MC = {
  '박현아': '#818cf8',
  '박경아': '#fb923c',
  '이혜선': '#34d399',
  '유이시': '#f87171',  // ★ '유이쉬' → '유이시'
  '허희원': '#fbbf24',
  '전체':   '#94a3b8',
};

// MMAP: key(드롭다운 식별자) → 디자이너 이름
const MMAP = {
  hyona:  '박현아',
  kyunga: '박경아',
  hyesun: '이혜선',
  yishi:  '유이시',  // ★ '유이쉬' → '유이시'
  heewon: '허희원',
};

// MEMBERS: 초기값은 하드코딩, GS getBase() 로드 후 덮어씀
let MEMBERS = ['박현아', '박경아', '이혜선', '유이시', '허희원'];

// 샘플 DATA (GS Tasks 로드 전 폴백)
let DATA = [
  {id:1, p:'BoA',    cat:'플브앨범',pn:'2nd Album Part.2',  t:'재킷 시안',         who:'박현아',s:'2026-06-01',e:'2026-06-10',st:'진행중',ty:'디자인',hr:null,sampleDate:null,workDate:'2026-06-10',noticeDate:null,launchDate:'2026-06-20'},
  {id:2, p:'BIGBANG',cat:'앨범',    pn:'BIGBANG 정규앨범',  t:'로고 시안',         who:'박경아',s:'2026-06-02',e:'2026-06-12',st:'진행중',ty:'디자인',hr:null,sampleDate:null,workDate:'2026-06-12',noticeDate:null,launchDate:'2026-06-25'},
  {id:3, p:'IVE',    cat:'팬키트',  pn:'IVE 2026 Fan Kit', t:'포토북 레이아웃',   who:'유이시',s:'2026-06-03',e:'2026-06-15',st:'진행중',ty:'디자인',hr:null,sampleDate:null,workDate:'2026-06-15',noticeDate:null,launchDate:'2026-06-30'},
  {id:4, p:'팀공통', cat:'팀공통',  pn:'정기 팀 미팅',      t:'팀 주간 회의',      who:'전체',  s:'2026-06-09',e:'2026-06-09',st:'진행중',ty:'팀공통',hr:10, sampleDate:null,workDate:null,       noticeDate:null,launchDate:null},
];

let flt        = { m:'all', d:'all', w:'all' };
let wArtist    = 'all';
let dArtist    = 'all';
let dSortTime  = false;
let curM       = { y: TODAY.getFullYear(), m: TODAY.getMonth() };
let wkOff      = 0;
let mView      = 'designer';
let projFlt    = 'all';
let dOff       = 0;

// ══════════════════════════════════════════════════════════
// ★ PATCH 4: loadBaseFromAPI — GS BASE_DATA로 완전 교체
// ══════════════════════════════════════════════════════════
async function loadBaseFromAPI() {
  try {
    const res  = await fetch(`${API_URL}?action=getBase`);
    const base = await res.json();
    if (base && base.designers) {
      // GS 데이터로 BASE_DATA 전체 교체
      BASE_DATA.designers    = base.designers;
      BASE_DATA.agencies     = base.agencies;
      BASE_DATA.artistMap    = base.artistMap;
      BASE_DATA.projectTypes = base.projectTypes;

      // MEMBERS 갱신 (팀 제외, GS가 이미 필터해서 줌)
      MEMBERS.splice(0, MEMBERS.length, ...base.designers);

// ★ PATCH 5: loadFromAPI — GS 로드 후 nextId = max+1
// ══════════════════════════════════════════════════════════
async function loadFromAPI() {
  try {
    showLoadingBanner('시트에서 데이터 불러오는 중...');
    const res   = await fetch(`${API_URL}?action=getTasks`);
    const tasks = await res.json();
    if (Array.isArray(tasks) && tasks.length > 0) {
      DATA      = tasks;
      API_READY = true;
      // ★ GS 발급 id 기준으로 nextId 설정
      nextId = Math.max(...tasks.map(t => Number(t.id) || 0)) + 1;
      hideLoadingBanner();
      buildArtistDropdowns(); // 로드 후 아티스트 목록 갱신
      renderSettings();       // Settings 탭 초기 렌더
      rM(); rD(); rW();
      console.log(`✅ GS Tasks ${tasks.length}건 로드, nextId=${nextId}`);
    } else {
      hideLoadingBanner();
      nextId = DATA.length + 1;
      console.log('Tasks 데이터 없음 — 샘플 데이터로 실행');
    }
  } catch(e) {
    hideLoadingBanner();
    console.warn('API 연결 실패 — 샘플 데이터로 실행:', e);
  }
}

// ══════════════════════════════════════════════════════════
// ★ PATCH 6: saveToSheet — GS 발급 id를 로컬 DATA에 반영
// ══════════════════════════════════════════════════════════
async function saveToSheet(task) {
  if (!API_READY) return;
  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      body:   JSON.stringify({ action: 'addTask', ...task }),
    });
    const json = await res.json();
    // ★ GS가 발급한 실제 id로 로컬 DATA 업데이트
    if (json.ok && json.id != null) {
      const local = DATA.find(d => d.id === task.id);
      if (local) local.id = json.id;
      // nextId도 갱신
      nextId = Math.max(nextId, json.id + 1);
    }
  } catch(e) { console.warn('저장 실패:', e); }
}

async function updateSheet(task) {
  if (!API_READY) return;

// 아티스트 컬러
const ARTIST_COLORS = [
  '#3b82f6','#f97316','#10b981','#a855f7','#f43f5e','#eab308',
  '#06b6d4','#ec4899','#84cc16','#f59e0b','#6366f1','#14b8a6',
  '#ef4444','#8b5cf6','#22c55e','#fb923c','#38bdf8','#e879f9',
];
const FIXED_COLORS = {
  '팀공통': { c:'#94a3b8', bg:'rgba(148,163,184,.18)' },
  '휴가':   { c:'#f43f5e', bg:'rgba(244,63,94,.22)' },
};
let CUSTOM_COLORS = {};
function loadCustomColors() { try { CUSTOM_COLORS = JSON.parse(localStorage.getItem('d4_artist_colors')||'{}'); } catch(e){} }
function saveCustomColors() { localStorage.setItem('d4_artist_colors', JSON.stringify(CUSTOM_COLORS)); }
loadCustomColors();
function hashArtist(name) {
  let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff;
  return h % ARTIST_COLORS.length;
}
function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function getArtistColor(name) {
  if (FIXED_COLORS[name]) return FIXED_COLORS[name].c;
  return CUSTOM_COLORS[name] || ARTIST_COLORS[hashArtist(name||'?')];
}
function pr(name) {
  if (FIXED_COLORS[name]) return FIXED_COLORS[name];
  const c = CUSTOM_COLORS[name] || ARTIST_COLORS[hashArtist(name||'?')];
  return { c, bg: hexToRgba(c, 0.18) };
}

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDate(dt){return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}(${DOW_KO[dt.getDay()]})`}
function filt(tab){
  const f=flt[tab];
  if(f==='all') return DATA;
  if(f==='team') return DATA.filter(x=>x.who==='전체'||x.p==='팀공통');
  const n=MMAP[f];
  return n?DATA.filter(x=>x.who===n||x.who==='전체'):DATA;
}
function filtW(){let b=filt('w');if(wArtist!=='all')b=b.filter(x=>x.p===wArtist);return b;}
function filtD(){let b=filt('d');if(dArtist!=='all')b=b.filter(x=>x.p===dArtist);return b;}
function evOn(key,tab){
  const src=tab==='w'?filtW():tab==='d'?filtD():filt(tab);
  return src.filter(x=>{const s=pd(x.s),e=pd(x.e),d=pd(key);return d>=s&&d<=e;});
}
function wkStart(off=0){
  const dow=TODAY.getDay(),m=new Date(TODAY);
  m.setDate(TODAY.getDate()-dow+(dow===0?-6:1)+off*7);return m;
}

// CARD
function mkCard(ev,hideProjLine=false){
  const p=pr(ev.p);
  const done=ev.st==='완료';
  const end=pd(ev.e);
  const diff=Math.ceil((end-TODAY)/86400000);
  const ddStr=diff===0?'D-DAY':diff>0?`D-${diff}`:`D+${Math.abs(diff)}`;
  const urg=diff<=3&&diff>=0;
  const deadLbl=ev.ty==='마감'?'인쇄 데드라인':ev.ty==='감리'?'감리 일정':ev.ty==='촬영'?'촬영 일정':ev.ty==='팀공통'?'미팅':'마감일';
  let timeStr='';
  if(ev.hr!=null){const ap=ev.hr<12?'오전':'오후';const h=ev.hr===0?12:ev.hr>12?ev.hr-12:ev.hr;timeStr=`${fmtDate(end)} ${ap} ${h}:00까지`;}
  else timeStr=`${fmtDate(end)} 종일`;
  const timeUrgent=urg&&ev.hr!=null;
  const catStr=ev.cat&&!['팀공통','휴가','대휴'].includes(ev.cat)?` · ${ev.cat}`:'';
  const pnStr=ev.pn?` · ${ev.pn}`:'';
  const projLine=hideProjLine?'':
    `<div class="cprojline"><span class="cprojline-artist" style="color:${p.c}">${ev.p}</span>${catStr}${pnStr}</div>`;
  const d=document.createElement('div');
  d.className='card'+(done?' done':'');
  d.style.borderLeftColor=p.c;
  d.innerHTML=`
    <div class="cbody">
      ${projLine}
      <div class="ctitle">${ev.t}</div>

// MODAL
function mkDetailRows(ev){
  function row(label,dateStr,hrVal=null,isLast=false){
    if(!dateStr)return'';
    const dt=pd(dateStr);const df=Math.ceil((dt-TODAY)/86400000);
    const ddTxt=df===0?'D-DAY':df>0?`D-${df}`:`D+${Math.abs(df)}`;
    let tl='';if(hrVal!=null){const ap=hrVal<12?'오전':'오후';const h=hrVal===0?12:hrVal>12?hrVal-12:hrVal;tl=` ${ap} ${h}:00`;}
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;${isLast?'':'border-bottom:1px solid var(--b)'}"><span style="font-family:var(--f);font-size:11px;color:var(--t3);font-weight:500">${label}</span><div style="display:flex;align-items:center;gap:10px"><span style="font-family:var(--f);font-size:11px;color:var(--t2)">${fmtDate(dt)}${tl}</span><span style="font-family:var(--f);font-size:11px;font-weight:600;color:var(--t3);min-width:42px;text-align:right">${ddTxt}</span></div></div>`;
  }
  const rows=[
    {label:'업무 마감일',    date:ev.e,           hr:ev.hr},
    {label:'샘플 데드라인',  date:ev.sampleDate,  hr:null},
    {label:'본작업 데드라인',date:ev.workDate,    hr:null},
    {label:'예판 오픈일',    date:ev.noticeDate,  hr:null},
    {label:'런칭일',         date:ev.launchDate,  hr:null},
  ].filter(r=>r.date);
  return rows.map((r,i)=>row(r.label,r.date,r.hr,i===rows.length-1)).join('');
}

let rpOff = 0; // 주 오프셋 (0=이번주)
let rpFlt = 'all'; // 디자이너 필터

function chRp(d) { rpOff += d; rReport(); }

function rReport() {
  const mon = wkStart(rpOff);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const monStr = `${mon.getFullYear()}.${String(mon.getMonth()+1).padStart(2,'0')}.${String(mon.getDate()).padStart(2,'0')}`;
  const sunStr = `${sun.getFullYear()}.${String(sun.getMonth()+1).padStart(2,'0')}.${String(sun.getDate()).padStart(2,'0')}`;

  document.getElementById('rp-title').textContent =
    `${mon.getFullYear()}.${String(mon.getMonth()+1).padStart(2,'0')}  ${mon.getDate()} — ${sun.getDate()}`;

  // 디자이너 필터 드롭다운 구성 (최초 1회)
  const rpMenu = document.getElementById('ddm-rp');
  if (rpMenu && rpMenu.children.length === 0) {
    let html = `<div class="dd-item sel" onclick="pickRp('all','전체 보기','var(--t2)',this)"><span class="dot" style="background:var(--t2)"></span>전체 보기</div><div class="dd-sep"></div>`;
    MEMBERS.forEach(name => {
      const color = MC[name] || '#888';
      html += `<div class="dd-item" onclick="pickRp('${name}','${name}','${color}',this)"><span class="dot" style="background:${color}"></span>${name}</div>`;
    });
    rpMenu.innerHTML = html;
  }

  // 해당 주 날짜 배열 생성 (월~일 7일)
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(d);
  }
  const dayKeys = days.map(d => dk(d));

  // 업무 필터링 — 해당 주 날짜 범위와 겹치는 모든 업무
  let weekData = DATA.filter(ev => {
    if (!ev.t) return false;
    const s = pd(ev.s), e = pd(ev.e);
    return dayKeys.some(day => { const d = pd(day); return d >= s && d <= e; });
  });
  if (rpFlt !== 'all') {
    weekData = weekData.filter(ev => ev.who === rpFlt || ev.who === '전체');
  }

  document.getElementById('rp-sub').textContent =
    `${monStr} — ${sunStr}  ·  ${weekData.length}건`;

  const body = document.getElementById('rp-body');
  body.innerHTML = '';

  if (weekData.length === 0) {
    body.innerHTML = `<div style="font-family:var(--f);font-size:12px;color:var(--t3);padding:20px 0">해당 주에 등록된 업무가 없습니다.</div>`;
    return;
  }

  // 프로젝트별 그룹화
  const groups = {};
  weekData.forEach(ev => {
    const key = ev.p || '기타';
    if (!groups[key]) groups[key] = [];
    groups[key].push(ev);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === '팀공통') return -1;
    if (b === '팀공통') return 1;
    return a.localeCompare(b, 'ko');
  });

  const DOW_SHORT = ['일','월','화','수','목','금','토'];

  // 반응형 그리드 컨테이너
  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px';
  body.appendChild(grid);

  sortedKeys.forEach(projKey => {
    const evs    = groups[projKey];
    const p      = pr(projKey);
    const catStr = evs[0]?.cat ? evs[0].cat : '';
    const pnStr  = evs[0]?.pn  ? evs[0].pn  : '';

    // 날짜 정렬
    const rows = [];
    evs.forEach(ev => {
      const evStart    = pd(ev.s);
      const displayDay = evStart >= days[0] ? evStart : days[0];
      rows.push({ dateObj: displayDay, ev });
    });
    rows.sort((a, b) => {
      const dc = a.dateObj - b.dateObj;
      return dc !== 0 ? dc : a.ev.t.localeCompare(b.ev.t, 'ko');
    });

    // 카드
    const card = document.createElement('div');
    card.style.cssText = `background:var(--sf);border:1px solid var(--b);border-left:3px solid ${p.c};border-radius:8px;padding:12px 14px;display:flex;flex-direction:column`;

    // 카드 헤더
    const hd = document.createElement('div');
    hd.style.cssText = 'margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--b)';
    hd.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-family:var(--f);font-size:12px;font-weight:700;color:${p.c}">${projKey}</span>
        ${catStr ? `<span style="font-family:var(--f);font-size:10px;padding:1px 6px;border-radius:3px;background:var(--sf2);color:var(--t2)">${catStr}</span>` : ''}
      </div>
      ${pnStr ? `<div style="font-family:var(--f);font-size:11px;color:var(--t2);margin-top:2px">${pnStr}</div>` : ''}`;
    card.appendChild(hd);

    // 업무 목록
    const listEl = document.createElement('div');
    listEl.style.cssText = 'display:flex;flex-direction:column;gap:1px;flex:1';
    rows.forEach(({ dateObj, ev }) => {
      const lbl = `${dateObj.getMonth()+1}/${dateObj.getDate()}(${DOW_SHORT[dateObj.getDay()]})`;
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:baseline;gap:8px;padding:3px 4px;border-radius:4px';
      row.innerHTML = `
        <span style="font-family:var(--f);font-size:10px;color:var(--t3);flex-shrink:0;min-width:52px">${lbl}</span>
        <span style="font-family:var(--f);font-size:11px;color:var(--t1);line-height:1.5">${ev.t}</span>`;
      listEl.appendChild(row);
    });
    card.appendChild(listEl);
    grid.appendChild(card);
  });
}

function copyReport() {
  // 현재 주간업무보고를 텍스트로 클립보드 복사
  const mon = wkStart(rpOff);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const monStr = `${mon.getFullYear()}.${String(mon.getMonth()+1).padStart(2,'0')}.${String(mon.getDate()).padStart(2,'0')}`;
  const sunStr = `${sun.getFullYear()}.${String(sun.getMonth()+1).padStart(2,'0')}.${String(sun.getDate()).padStart(2,'0')}`;

  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    days.push(dk(d));
  }

  let weekData = DATA.filter(ev => {
    const s = pd(ev.s), e = pd(ev.e);
    return days.some(day => { const d = pd(day); return d >= s && d <= e; });
  });
  if (rpFlt !== 'all') weekData = weekData.filter(ev => ev.who === rpFlt || ev.who === '전체');

  const groups = {};
  weekData.forEach(ev => {
    const key = ev.p || '기타';
    if (!groups[key]) groups[key] = [];
    groups[key].push(ev);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === '팀공통') return -1; if (b === '팀공통') return 1;
    return a.localeCompare(b, 'ko');
  });

  let text = `📋 주간업무보고 ${monStr} — ${sunStr}\n`;
  text += `${'─'.repeat(40)}\n\n`;

  const days2 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i); days2.push(d);
  }

  sortedKeys.forEach(projKey => {
    const evs    = groups[projKey];
    const catStr = evs[0]?.cat ? ` [${evs[0].cat}]` : '';
    const pnStr  = evs[0]?.pn  ? ` ${evs[0].pn}` : '';
    text += `■ ${projKey}${catStr}${pnStr}\n`;

    const rows = [];
    evs.forEach(ev => {
      const evS = pd(ev.s);
      const displayDay = evS >= days2[0] ? evS : days2[0];
      rows.push({ day: displayDay, ev });
    });
    rows.sort((a, b) => a.day - b.day || a.ev.t.localeCompare(b.ev.t, 'ko'));

    const DOW_SHORT = ['일','월','화','수','목','금','토'];
    rows.forEach(({ day, ev }) => {
      const lbl = `${day.getMonth()+1}/${day.getDate()}(${DOW_SHORT[day.getDay()]})`;
      text += `  ${lbl}  ${ev.t}\n`;
    });
    text += '\n';
  });

  const totalCnt = weekData.length;
  text += `${'─'.repeat(40)}\n`;
  text += `총 ${totalCnt}건\n`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('#panel-report .vbtn');
    if (btn) { btn.textContent = '✓ 복사됨'; setTimeout(() => btn.textContent = '📋 복사', 2000); }
  }).catch(() => alert(text));
}

let GS_PROJECTS  = [];   // GS에서 로드한 프로젝트 목록

async function loadProjects() {
  const btn  = document.getElementById('proj-sync-btn');
  const list = document.getElementById('proj-list');
  if (btn) { btn.textContent = '로딩 중...'; btn.disabled = true; }
  list.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3);padding:20px 0">GS에서 불러오는 중...</div>`;
  try {
    const res  = await fetch(`${API_URL}?action=getProjects`);
    const data = await res.json();
    GS_PROJECTS = (data.rows || []);
    renderProjects();
  } catch(e) {
    list.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3);padding:20px 0">로드 실패. API 연결을 확인해주세요.</div>`;
  }
  if (btn) { btn.textContent = '↺ 새로고침'; btn.disabled = false; }
}

  projFilter = f;
  document.querySelectorAll('#proj-filter-bar .vbtn').forEach(b => b.classList.remove('on'));
  if (el) el.classList.add('on');
  renderProjects();

function renderProjects() {
  const list = document.getElementById('proj-list');
  if (!list) return;

  let projs = projFilter === 'all'    ? GS_PROJECTS
            : projFilter === '완료'   ? GS_PROJECTS.filter(p => p.done)
            : GS_PROJECTS.filter(p => !p.done);

  if (projs.length === 0) {
    list.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3);padding:20px 0">프로젝트가 없습니다.</div>`;
    return;
  }

  list.innerHTML = '';
  projs.forEach(proj => {
    const p   = pr(proj.artist || proj.agency || '?');
    const done = proj.done;

    const fmtD = s => {
      if (!s) return '—';
      const d = new Date(s);
      if (isNaN(d)) return s;
      const DOW_KO2 = ['일','월','화','수','목','금','토'];
      return `${d.getMonth()+1}/${d.getDate()}(${DOW_KO2[d.getDay()]})`;
    };

    const card = document.createElement('div');
    card.style.cssText = `background:var(--sf);border:1px solid var(--b);border-left:3px solid ${p.c};border-radius:8px;padding:12px 14px;transition:border-color .15s;opacity:${done?'.5':'1'};display:flex;flex-direction:column`;
    card.onmouseover = () => card.style.borderColor = 'rgba(255,255,255,.2)';
    card.onmouseout  = () => card.style.borderColor = 'var(--b)';
    card.innerHTML = `
      <div style="display:flex;flex-direction:column;height:100%">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-family:var(--f);font-size:12px;font-weight:700;color:${p.c}">${proj.artist||'—'}</span>
              ${proj.agency ? `<span style="font-family:var(--f);font-size:10px;color:var(--t3)">${proj.agency}</span>` : ''}
              ${proj.cat    ? `<span style="font-family:var(--f);font-size:10px;padding:1px 6px;border-radius:3px;background:var(--sf2);color:var(--t2)">${proj.cat}</span>` : ''}
            </div>
            ${proj.pn ? `<div style="font-family:var(--f);font-size:12px;color:var(--t1);line-height:1.4">${proj.pn}</div>` : ''}
          </div>
          <button onclick="openProjModal(${proj.rowIdx})" title="수정"
            style="height:22px;padding:0 10px;border-radius:4px;background:var(--sf2);border:1px solid var(--b2);font-family:var(--f);font-size:10px;color:var(--t2);cursor:pointer;flex-shrink:0;transition:all .12s" onmouseover="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='var(--t1)'" onmouseout="this.style.borderColor='rgba(255,255,255,.13)';this.style.color='var(--t2)'">수정</button>
        </div>

        <div style="display:grid;grid-template-columns:auto 1fr;gap:3px 12px;margin-bottom:10px;align-items:center">
          ${proj.presaleDate ? `<span style="font-family:var(--f);font-size:10px;color:var(--t3)">예판</span><span style="font-family:var(--f);font-size:10px;color:var(--t1);font-weight:500">${fmtD(proj.presaleDate)}</span>` : ''}
          ${proj.launchDate  ? `<span style="font-family:var(--f);font-size:10px;color:var(--t3)">런칭</span><span style="font-family:var(--f);font-size:10px;color:var(--t1);font-weight:500">${fmtD(proj.launchDate)}</span>`  : ''}
        </div>

        <div style="margin-top:auto;display:flex;justify-content:flex-end;gap:5px">
          ${proj.fileUrl ? `<a href="${proj.fileUrl}" target="_blank" onclick="event.stopPropagation()" style="width:64px;height:22px;border-radius:4px;background:var(--sf2);border:1px solid var(--b2);font-family:var(--f);font-size:10px;color:var(--t2);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:all .12s" onmouseover="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='var(--t1)'" onmouseout="this.style.borderColor='rgba(255,255,255,.13)';this.style.color='var(--t2)'">작업파일</a>` : ''}
          ${proj.specUrl ? `<a href="${proj.specUrl}" target="_blank" onclick="event.stopPropagation()" style="width:64px;height:22px;border-radius:4px;background:var(--sf2);border:1px solid var(--b2);font-family:var(--f);font-size:10px;color:var(--t2);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:all .12s" onmouseover="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='var(--t1)'" onmouseout="this.style.borderColor='rgba(255,255,255,.13)';this.style.color='var(--t2)'">사양서</a>` : ''}
        </div>
      </div>`;
    list.appendChild(card);
  });
}

// 프로젝트 모달
function openProjModal(rowIdx) {
  editingProjRowIdx = rowIdx || null;
  document.getElementById('proj-modal-title').textContent = rowIdx ? '프로젝트 수정' : '프로젝트 추가';
  document.getElementById('pf-delete-btn').style.display  = rowIdx ? 'block' : 'none';

  populateAgencySelect(document.getElementById('pf-agency'), '');
  populateCatSelect(document.getElementById('pf-cat'), '');

  if (rowIdx) {
    const proj = GS_PROJECTS.find(p => p.rowIdx === rowIdx);
    if (proj) {
      document.getElementById('pf-agency').value = proj.agency  || '';
      onProjAgencyChange(proj.artist);
      document.getElementById('pf-artist').value = proj.artist  || '';
      document.getElementById('pf-cat').value    = proj.cat     || '';
      document.getElementById('pf-pn').value     = proj.pn      || '';
      document.getElementById('pf-sample').value = proj.sampleDL   || '';
      document.getElementById('pf-work').value   = proj.workDL     || '';
      document.getElementById('pf-notice').value = proj.presaleDate|| '';
      document.getElementById('pf-launch').value = proj.launchDate || '';
      document.getElementById('pf-fileurl').value   = proj.fileUrl   || '';
      document.getElementById('pf-specurl').value   = proj.specUrl   || '';
      document.getElementById('pf-supplyurl').value = proj.supplyUrl || '';
    }
  } else {
    ['pf-pn','pf-sample','pf-work','pf-notice','pf-launch','pf-fileurl','pf-specurl','pf-supplyurl'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('pf-agency').value = '';
    document.getElementById('pf-artist').innerHTML = '<option value="">소속사 먼저 선택</option>';
    document.getElementById('pf-cat').value = '';
  }

  document.getElementById('proj-modal-back').classList.add('on');
  document.getElementById('proj-modal-box').classList.add('on');
}

function closeProjModal() {
  document.getElementById('proj-modal-back').classList.remove('on');
  document.getElementById('proj-modal-box').classList.remove('on');
  editingProjRowIdx = null;
}

function onProjAgencyChange(selectedArtist) {
  const ag = document.getElementById('pf-agency').value;
  populateArtistSelect(document.getElementById('pf-artist'), ag, selectedArtist || '');
}

async function saveProjModal() {
  const body = {
    agency:      document.getElementById('pf-agency').value,
    artist:      document.getElementById('pf-artist').value,
    cat:         document.getElementById('pf-cat').value,
    pn:          document.getElementById('pf-pn').value.trim(),
    sampleDL:    document.getElementById('pf-sample').value || null,
    workDL:      document.getElementById('pf-work').value   || null,
    presaleDate: document.getElementById('pf-notice').value || null,
    launchDate:  document.getElementById('pf-launch').value || null,
    fileUrl:     document.getElementById('pf-fileurl').value.trim()   || null,
    specUrl:     document.getElementById('pf-specurl').value.trim()   || null,
    supplyUrl:   document.getElementById('pf-supplyurl').value.trim() || null,
  };
  if (!body.artist) { showToast('아티스트를 선택해주세요'); return; }

  const saveBtn = document.querySelector('#proj-modal-box .btn-add');
  if (saveBtn) { saveBtn.textContent = '저장 중...'; saveBtn.disabled = true; }

  try {
    if (editingProjRowIdx) {
      body.action = 'updateProject';
      body.rowIdx = editingProjRowIdx;
    } else {
      body.action = 'addProject';
    }
    await fetch(API_URL, { method:'POST', body: JSON.stringify(body) });
    closeProjModal();
    await loadProjects();
    showToast(editingProjRowIdx ? '프로젝트 수정됨' : '프로젝트 추가됨');
  } catch(e) {
    showToast('저장 실패');
  }
  if (saveBtn) { saveBtn.textContent = '저장'; saveBtn.disabled = false; }
}

async function deleteProjFromModal() {
  if (!editingProjRowIdx) return;
  const proj = GS_PROJECTS.find(p => p.rowIdx === editingProjRowIdx);
  const name = proj ? (proj.pn || proj.artist || '이 프로젝트') : '이 프로젝트';
  if (!confirm(`"${name}"를 삭제할까요?`)) return;
  try {
    await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'deleteProject', rowIdx: editingProjRowIdx }) });
    closeProjModal();
    await loadProjects();
    showToast('프로젝트 삭제됨');
  } catch(e) { showToast('삭제 실패'); }
}

document.getElementById('proj-modal-back').addEventListener('click', closeProjModal);

// ══════════════════════════════════════════════════════════
// SETTINGS 탭 — GS 기본설정 탭 직접 연동
// ══════════════════════════════════════════════════════════

let siType        = null;
let siEditIdx     = null;
let siAgencyFilter = '';

async function syncSettingsFromGS() {
  const btn = document.getElementById('settings-sync-btn');
  if (btn) { btn.textContent = '로딩 중...'; btn.disabled = true; }

  try {
    const res  = await fetch(`${API_URL}?action=getSettings`);
    const data = await res.json();
    if (data && (data.designers || data.agencies)) {
      BASE_DATA.designers    = data.designers    || BASE_DATA.designers;
      BASE_DATA.agencies     = data.agencies     || BASE_DATA.agencies;
      BASE_DATA.artistMap    = data.artistMap    || BASE_DATA.artistMap;
      BASE_DATA.projectTypes = data.categories   || BASE_DATA.projectTypes;
      const members = (data.designers || []).filter(d => d !== '팀');
      if (members.length > 0) {
        MEMBERS.splice(0, MEMBERS.length, ...members);
        buildDesignerDropdowns();
        buildArtistDropdowns();
        populateFormDropdowns();
      }
    }
  } catch(e) {
    // API 실패해도 BASE_DATA 있는 것 그냥 렌더
    console.warn('getSettings 실패, BASE_DATA로 렌더:', e);
  }

  renderSettings();
  if (btn) { btn.textContent = '↺ GS 동기화'; btn.disabled = false; }
}

// BASE_DATA 변경 후 GS에 저장
async function pushSettingsToGS() {
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:     'saveSettings',
        designers:  BASE_DATA.designers,
        agencies:   BASE_DATA.agencies,
        artistMap:  BASE_DATA.artistMap,
        categories: BASE_DATA.projectTypes,
      }),
    });
  } catch(e) { console.warn('Settings GS 저장 실패:', e); }
}

function renderSettings() {
  renderSettingsDesigners();
  renderSettingsAgencies();
  renderSettingsArtists();
  renderSettingsCategories();
}

function mkSettingsTable(rows) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'border:1px solid var(--b);border-radius:7px;overflow:hidden';
  rows.forEach((item, i) => {
    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:7px 10px;${i < rows.length-1 ? 'border-bottom:1px solid var(--b)' : ''};transition:background .1s`;
    row.onmouseover = () => row.style.background = 'rgba(255,255,255,.03)';
    row.onmouseout  = () => row.style.background = '';
    row.innerHTML = `
      <span style="font-family:var(--f);font-size:11px;color:var(--t1)">${item.text}</span>
      <button onclick="${item.onclick}" title="수정"
        style="height:22px;padding:0 10px;border-radius:4px;background:var(--sf2);border:1px solid var(--b2);font-family:var(--f);font-size:10px;color:var(--t2);cursor:pointer;flex-shrink:0;transition:all .12s" onmouseover="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='var(--t1)'" onmouseout="this.style.borderColor='rgba(255,255,255,.13)';this.style.color='var(--t2)'">수정</button>`;
    wrap.appendChild(row);
  });
  return wrap;
}

function renderSettingsDesigners() {
  const el = document.getElementById('settings-designers'); if (!el) return;
  el.innerHTML = '';
  const list = BASE_DATA.designers || [];
  if (!list.length) { el.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3)">데이터 없음</div>`; return; }
  el.appendChild(mkSettingsTable(list.map((d, i) => ({ text: d, onclick: `openSettingsItemModal('designer',${i})` }))));
}

function renderSettingsAgencies() {
  const el = document.getElementById('settings-agencies'); if (!el) return;
  el.innerHTML = '';
  const list = BASE_DATA.agencies || [];
  if (!list.length) { el.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3)">데이터 없음</div>`; return; }
  el.appendChild(mkSettingsTable(list.map((a, i) => ({ text: a, onclick: `openSettingsItemModal('agency',${i})` }))));
}

function renderSettingsArtists() {
  const tabBar = document.getElementById('settings-agency-tabs');
  const el     = document.getElementById('settings-artists');
  if (!el) return;
  if (tabBar) tabBar.innerHTML = ''; // 탭 필터 숨김

  const agencies = Object.keys(BASE_DATA.artistMap || {});
  if (!agencies.length) {
    el.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3)">데이터 없음</div>`;
    return;
  }

  el.innerHTML = '';

  // 소속사별로 표 분리, 반응형 그리드
  const outerGrid = document.createElement('div');
  outerGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px';

  agencies.forEach(ag => {
    const artists = (BASE_DATA.artistMap[ag] || []);
    if (!artists.length) return;

    const section = document.createElement('div');

    // 소속사 라벨
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-family:var(--f);font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;margin-bottom:6px';
    lbl.textContent = ag;
    section.appendChild(lbl);

    // 표
    const wrap = document.createElement('div');
    wrap.style.cssText = 'border:1px solid var(--b);border-radius:7px;overflow:hidden';
    artists.forEach((a, i) => {
      const row = document.createElement('div');
      row.style.cssText = `display:flex;align-items:center;justify-content:space-between;padding:6px 10px;${i < artists.length-1 ? 'border-bottom:1px solid var(--b)' : ''};transition:background .1s`;
      row.onmouseover = () => row.style.background = 'rgba(255,255,255,.03)';
      row.onmouseout  = () => row.style.background = '';
      row.innerHTML = `
        <span style="font-family:var(--f);font-size:11px;color:var(--t1)">${a}</span>
        <button onclick="(function(){siAgencyFilter='${ag}';openSettingsItemModal('artist',${i});})()"
          style="height:22px;padding:0 10px;border-radius:4px;background:var(--sf2);border:1px solid var(--b2);font-family:var(--f);font-size:10px;color:var(--t2);cursor:pointer;flex-shrink:0;transition:all .12s"
          onmouseover="this.style.borderColor='rgba(255,255,255,.3)';this.style.color='var(--t1)'"
          onmouseout="this.style.borderColor='rgba(255,255,255,.13)';this.style.color='var(--t2)'">수정</button>`;
      wrap.appendChild(row);
    });
    section.appendChild(wrap);
    outerGrid.appendChild(section);
  });

  el.appendChild(outerGrid);
}

function renderSettingsCategories() {
  const el = document.getElementById('settings-categories'); if (!el) return;
  el.innerHTML = '';
  const list = BASE_DATA.projectTypes || [];
  if (!list.length) { el.innerHTML = `<div style="font-family:var(--f);font-size:11px;color:var(--t3)">데이터 없음</div>`; return; }
  el.appendChild(mkSettingsTable(list.map((c, i) => ({ text: c, onclick: `openSettingsItemModal('category',${i})` }))));
}

function openSettingsItemModal(type, idx) {
  siType = type; siEditIdx = (idx !== null && idx !== undefined && idx !== 'null') ? Number(idx) : null;
  const titleMap = { designer:'디자이너', agency:'소속사', artist:'아티스트', category:'프로젝트 구분' };
  document.getElementById('si-modal-title').textContent = `${titleMap[type] || type} ${siEditIdx !== null ? '수정' : '추가'}`;
  document.getElementById('si-delete-btn').style.display = siEditIdx !== null ? 'block' : 'none';

  const body = document.getElementById('si-modal-body');
  body.innerHTML = '';

  if (type === 'designer') {
    const cur = siEditIdx !== null ? (BASE_DATA.designers || [])[siEditIdx] : '';
    body.innerHTML = `<div class="form-row"><label>디자이너 이름</label><input class="form-inp" id="si-val" value="${cur}" placeholder="예: 홍길동"></div>`;
  } else if (type === 'agency') {
    const cur = siEditIdx !== null ? (BASE_DATA.agencies || [])[siEditIdx] : '';
    body.innerHTML = `<div class="form-row"><label>소속사 이름</label><input class="form-inp" id="si-val" value="${cur}" placeholder="예: SM"></div>`;
  } else if (type === 'artist') {
    const agList    = Object.keys(BASE_DATA.artistMap || {});
    const curArtist = siEditIdx !== null ? ((BASE_DATA.artistMap || {})[siAgencyFilter] || [])[siEditIdx] : '';
    body.innerHTML = `
      <div class="form-row"><label>소속사</label>
        <select class="form-sel" id="si-agency">
          ${agList.map(a => `<option value="${a}"${a===siAgencyFilter?' selected':''}>${a}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label>아티스트 이름</label>
        <input class="form-inp" id="si-val" value="${curArtist}" placeholder="예: RIIZE">
      </div>`;
  } else if (type === 'category') {
    const cur = siEditIdx !== null ? (BASE_DATA.projectTypes || [])[siEditIdx] : '';
    body.innerHTML = `<div class="form-row"><label>구분 이름</label><input class="form-inp" id="si-val" value="${cur}" placeholder="예: 앨범"></div>`;
  }

  document.getElementById('si-modal-back').classList.add('on');
  document.getElementById('si-modal-box').classList.add('on');
  setTimeout(() => document.getElementById('si-val')?.focus(), 80);
}

function closeSIModal() {
  document.getElementById('si-modal-back').classList.remove('on');
  document.getElementById('si-modal-box').classList.remove('on');
  siType = null; siEditIdx = null;
}

async function saveSIItem() {
  const val = (document.getElementById('si-val')?.value || '').trim();
  if (!val) { showToast('값을 입력해주세요'); return; }

  if (siType === 'designer') {
    if (siEditIdx !== null) BASE_DATA.designers[siEditIdx] = val;
    else BASE_DATA.designers.push(val);
    MEMBERS.splice(0, MEMBERS.length, ...BASE_DATA.designers);
    buildDesignerDropdowns();
    renderSettingsDesigners();

  } else if (siType === 'agency') {
    if (siEditIdx !== null) {
      const old = BASE_DATA.agencies[siEditIdx];
      BASE_DATA.agencies[siEditIdx] = val;
      if (BASE_DATA.artistMap[old]) { BASE_DATA.artistMap[val] = BASE_DATA.artistMap[old]; delete BASE_DATA.artistMap[old]; }
    } else {
      BASE_DATA.agencies.push(val);
      BASE_DATA.artistMap[val] = [];
    }
    buildArtistDropdowns();
    renderSettingsAgencies();
    renderSettingsArtists();

  } else if (siType === 'artist') {
    const ag = document.getElementById('si-agency')?.value || siAgencyFilter;
    siAgencyFilter = ag;
    if (!BASE_DATA.artistMap[ag]) BASE_DATA.artistMap[ag] = [];
    if (siEditIdx !== null) BASE_DATA.artistMap[ag][siEditIdx] = val;
    else BASE_DATA.artistMap[ag].push(val);
    buildArtistDropdowns();
    renderSettingsArtists();

  } else if (siType === 'category') {
    if (siEditIdx !== null) BASE_DATA.projectTypes[siEditIdx] = val;
    else BASE_DATA.projectTypes.push(val);
    renderSettingsCategories();
    populateFormDropdowns();
  }

  closeSIModal();
  // GS에 반영
  await pushSettingsToGS();
  showToast('저장됨 (GS 반영 중)');
}

async function deleteSIItem() {
  if (siEditIdx === null) return;

  if (siType === 'designer') {
    if (!confirm(`"${BASE_DATA.designers[siEditIdx]}" 삭제할까요?`)) return;
    BASE_DATA.designers.splice(siEditIdx, 1);
    MEMBERS.splice(0, MEMBERS.length, ...BASE_DATA.designers);
    buildDesignerDropdowns(); renderSettingsDesigners();

  } else if (siType === 'agency') {
    if (!confirm(`"${BASE_DATA.agencies[siEditIdx]}" 소속사를 삭제할까요?`)) return;
    const name = BASE_DATA.agencies.splice(siEditIdx, 1)[0];
    delete BASE_DATA.artistMap[name];
    buildArtistDropdowns(); renderSettingsAgencies(); renderSettingsArtists();

  } else if (siType === 'artist') {
    const ag = siAgencyFilter;
    if (!confirm(`"${(BASE_DATA.artistMap[ag]||[])[siEditIdx]}" 삭제할까요?`)) return;
    (BASE_DATA.artistMap[ag] || []).splice(siEditIdx, 1);
    buildArtistDropdowns(); renderSettingsArtists();

  } else if (siType === 'category') {
    if (!confirm(`"${BASE_DATA.projectTypes[siEditIdx]}" 삭제할까요?`)) return;
    BASE_DATA.projectTypes.splice(siEditIdx, 1);
    renderSettingsCategories(); populateFormDropdowns();
  }

  closeSIModal();
  await pushSettingsToGS();
  showToast('삭제됨 (GS 반영 중)');
}

document.getElementById('si-modal-back').addEventListener('click', closeSIModal);

loadBaseFromAPI(); // ★ 먼저 GS 기본설정 로드
loadFromAPI();     // ★ 그 다음 Tasks 로드
rM();rD();rW();
